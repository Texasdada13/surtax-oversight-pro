databases:
  - name: surtax-oversight-db
    plan: free
    databaseName: surtax_pro
    user: surtax

services:
  - type: web
    name: surtax-oversight-pro
    runtime: python
    plan: free
    buildCommand: "./render-build.sh"
    startCommand: "gunicorn run:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: surtax-oversight-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.6
