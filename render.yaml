services:
  - type: web
    name: surtax-oversight-pro
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/init_db.py && python scripts/generate_sample_data.py
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120 "app:create_app()"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: SECRET_KEY
        generateValue: true
      - key: SURTAX_COUNTY
        value: marion
      - key: FLASK_ENV
        value: production
    autoDeploy: true
    healthCheckPath: /
