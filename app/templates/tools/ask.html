{% extends "base.html" %}
{% block content %}
<style>
    main { background: #0f172a !important; }
    main > div { padding: 1.5rem !important; }
    .dark-card { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; }
</style>
<div class="space-y-6" x-data="askAI()">
    <div>
        <h1 class="text-2xl font-bold text-white">Ask AI Assistant</h1>
        <p class="text-slate-400">Get AI-powered answers about contracts, budgets, and project performance</p>
    </div>

    <!-- Guided Prompts -->
    <div class="flex flex-wrap gap-2">
        {% for p in guided_prompts %}
        <button @click="askQuestion('{{ p.question }}')"
                class="px-3 py-1.5 text-sm bg-blue-500/20 text-blue-300 rounded-full hover:bg-blue-500/20 transition-colors border border-blue-500/30">
            {{ p.label }}
        </button>
        {% endfor %}
    </div>

    <!-- Chat Messages -->
    <div class="dark-card min-h-[300px] max-h-[500px] overflow-y-auto p-4 space-y-4" id="chat-messages">
        <template x-for="msg in messages" :key="msg.id">
            <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
                <div :class="msg.role === 'user' ? 'bg-blue-600 text-white' : 'bg-slate-800 text-white'"
                     class="rounded-xl px-4 py-3 max-w-[80%] text-sm whitespace-pre-wrap" x-text="msg.content"></div>
            </div>
        </template>
        <div x-show="loading" class="flex justify-start">
            <div class="bg-slate-800 rounded-xl px-4 py-3 text-sm text-slate-400">
                <span class="animate-pulse">Thinking...</span>
            </div>
        </div>
        <div x-show="messages.length === 0 && !loading" class="text-center py-12 text-slate-500">
            <svg class="w-12 h-12 mx-auto mb-3 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
            </svg>
            <p>Ask a question or click a guided prompt above</p>
        </div>
    </div>

    <!-- Input -->
    <div class="flex gap-2">
        <input type="text" x-model="question" @keydown.enter="askQuestion()"
               placeholder="Ask about contracts, budgets, vendors..."
               class="flex-1 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        <button @click="askQuestion()" :disabled="loading || !question.trim()"
                class="px-6 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 disabled:opacity-50 text-sm font-medium">
            Send
        </button>
    </div>
</div>

<script>
function askAI() {
    return {
        question: '',
        messages: [],
        loading: false,
        msgId: 0,
        askQuestion(q) {
            const text = q || this.question.trim();
            if (!text || this.loading) return;
            this.question = '';
            this.messages.push({id: ++this.msgId, role: 'user', content: text});
            this.loading = true;
            this.$nextTick(() => {
                document.getElementById('chat-messages').scrollTop = 99999;
            });
            fetch('/api/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({question: text})
            })
            .then(r => r.json())
            .then(data => {
                this.messages.push({id: ++this.msgId, role: 'assistant', content: data.answer || data.error || 'No response'});
                this.loading = false;
                this.$nextTick(() => {
                    document.getElementById('chat-messages').scrollTop = 99999;
                });
            })
            .catch(err => {
                this.messages.push({id: ++this.msgId, role: 'assistant', content: 'Error: ' + err.message});
                this.loading = false;
            });
        }
    }
}
</script>
{% endblock %}
